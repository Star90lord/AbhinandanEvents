<svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="goldGradient" x1="40" y1="40" x2="280" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FACC15"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="160" cy="160" r="145" fill="#0F172A"/>

  <!-- Outer Ring -->
  <circle cx="160" cy="160" r="132"
          stroke="url(#goldGradient)"
          stroke-width="6"
          opacity="0.9"/>

  <!-- Decorative Sparks -->
  <g opacity="0.9">
    <path d="M160 38L170 74H150L160 38Z" fill="#FACC15"/>
    <path d="M160 282L170 246H150L160 282Z" fill="#F97316"/>
    <path d="M38 160L74 150V170L38 160Z" fill="#FACC15"/>
    <path d="M282 160L246 150V170L282 160Z" fill="#F97316"/>
  </g>

  <!-- Main Star -->
  <g filter="url(#shadow)">
    <path d="M160 78
             L182 128
             H236
             L192 162
             L210 216
             L160 184
             L110 216
             L128 162
             L84 128
             H138
             Z"
          fill="url(#goldGradient)"/>
  </g>

  <!-- Letter A -->
  <text x="160"
        y="182"
        text-anchor="middle"
        font-family="Poppins, Arial, sans-serif"
        font-size="64"
        font-weight="700"
        fill="#FFFFFF">
    A
  </text>

</svg>
